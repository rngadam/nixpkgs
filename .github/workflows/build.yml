name: "Build and Cache"
on:
  push:
    branches: [main]
  pull_request:
jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            system: x86_64-linux
          - os: macos-14 # Apple Silicon (M1/M2)
            system: aarch64-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@v16
        with:
          name: rngadam # Replace with your actual Cachix cache name
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          pushFilter: "(-source$|\\.tar\\.gz$|\\.tar\\.xz$|\\.patch$)"
      - name: Build
        run: |
          nix build .#ingress2gateway --print-build-logs
          nix build .#gwctl --print-build-logs
